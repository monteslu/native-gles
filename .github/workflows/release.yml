name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            platform: linux
          - os: ubuntu-22.04-arm
            arch: arm64
            platform: linux
          - os: macos-15
            arch: arm64
            platform: darwin
          - os: macos-15-intel
            arch: x64
            platform: darwin
          - os: windows-2022
            arch: x64
            platform: win32
          - os: windows-11-arm
            arch: arm64
            platform: win32

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libegl-dev libgles-dev

      - name: Install npm deps
        run: npm install --ignore-scripts

      - name: Download ANGLE
        if: matrix.platform != 'linux'
        run: npm run download-angle

      - name: Build from source
        run: npm run build
        env:
          NATIVE_GLES_FROM_SOURCE: 1

      - name: Run tests
        run: npm test
        env:
          EGL_PLATFORM: ${{ matrix.platform == 'linux' && 'surfaceless' || '' }}
          LIBGL_ALWAYS_SOFTWARE: ${{ matrix.platform == 'linux' && '1' || '' }}

      - name: Upload release
        run: npm run upload-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-install:
    needs: build
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
          - os: macos-15
          - os: macos-15-intel
          - os: windows-2022
          - os: windows-11-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: contains(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libegl1-mesa libgles2-mesa

      - name: Install from release (prebuild)
        run: npm install

      - name: Run tests
        run: npm test
        env:
          EGL_PLATFORM: ${{ contains(matrix.os, 'ubuntu') && 'surfaceless' || '' }}
          LIBGL_ALWAYS_SOFTWARE: ${{ contains(matrix.os, 'ubuntu') && '1' || '' }}
